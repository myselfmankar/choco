<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Cloud — Personal Storage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link href="https://releases.transloadit.com/uppy/v3.25.5/uppy.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0d10;
            --surface: #111318;
            --panel: #161a21;
            --raised: #1c2028;
            --border: #222733;
            --border2: #2c3240;
            --muted: #414858;
            --dim: #6b7585;
            --text: #c8cdd8;
            --bright: #eceef4;
            --accent: #3b82f6;
            --accent2: #60a5fa;
            --green: #22c55e;
            --red: #ef4444;
            --amber: #f59e0b;
            --purple: #818cf8;
            --pink: #f472b6;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'IBM Plex Sans', sans-serif;
            --radius: 8px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        nav {
            flex-shrink: 0;
            height: 54px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.75rem;
            z-index: 100;
        }

        .logo {
            font-family: var(--mono);
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.14em;
            color: var(--bright);
            display: flex;
            align-items: center;
            gap: 0.55rem;
        }

        .logo-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            animation: blink 2.8s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 8px var(--accent);
            }

            50% {
                opacity: 0.35;
                box-shadow: 0 0 2px var(--accent);
            }
        }

        .nav-pill {
            font-family: var(--mono);
            font-size: 0.68rem;
            color: var(--dim);
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 20px;
        }

        #root {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .app {
            display: grid;
            grid-template-columns: 260px 1fr;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .sidebar-inner {
            padding: 1.4rem;
            display: flex;
            flex-direction: column;
            gap: 1.6rem;
        }

        .sidebar-section-label {
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.65rem;
        }

        .storage-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem 1.1rem;
        }

        .storage-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.75rem;
        }

        .storage-used {
            font-family: var(--mono);
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--bright);
        }

        .storage-cap {
            font-family: var(--mono);
            font-size: 0.68rem;
            color: var(--muted);
        }

        .bar-track {
            height: 3px;
            background: var(--border2);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 0.55rem;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 2px;
            transition: width 0.6s ease;
        }

        .storage-pct {
            font-family: var(--mono);
            font-size: 0.62rem;
            color: var(--muted);
        }

        .type-list {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .type-row {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.45rem 0.7rem;
            border-radius: 5px;
            transition: background 0.15s;
        }

        .type-row:hover {
            background: var(--panel);
        }

        .type-swatch {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .type-label {
            flex: 1;
            font-size: 0.78rem;
            color: var(--dim);
        }

        .type-badge {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--muted);
            background: var(--raised);
            border: 1px solid var(--border);
            padding: 1px 6px;
            border-radius: 10px;
        }

        .quick-stats {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
        }

        .stat-key {
            color: var(--dim);
        }

        .stat-val {
            font-family: var(--mono);
            font-size: 0.68rem;
            color: var(--text);
        }

        .main {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .uppy-zone {
            flex-shrink: 0;
            padding: 1.25rem 1.5rem 0;
        }

        /* Uppy overrides */
        .uppy-Root,
        .uppy-Root * {
            font-family: var(--sans) !important;
        }

        .uppy-Dashboard-inner {
            background: var(--panel) !important;
            border: 1px solid var(--border2) !important;
            border-radius: var(--radius) !important;
            width: 100% !important;
        }

        .uppy-Dashboard-AddFiles {
            background: var(--panel) !important;
            border-color: transparent !important;
        }

        .uppy-Dashboard-AddFiles-title {
            color: var(--text) !important;
            font-size: 0.9rem !important;
            font-weight: 400 !important;
        }

        .uppy-Dashboard-browse {
            color: var(--accent2) !important;
            text-decoration: none !important;
            font-weight: 500 !important;
        }

        .uppy-Dashboard-note {
            color: var(--muted) !important;
            font-size: 0.72rem !important;
        }

        .uppy-DashboardContent-bar {
            background: var(--raised) !important;
            border-bottom: 1px solid var(--border) !important;
        }

        .uppy-DashboardContent-title {
            color: var(--bright) !important;
            font-size: 0.82rem !important;
        }

        .uppy-DashboardContent-back,
        .uppy-DashboardContent-addMore {
            color: var(--accent2) !important;
            font-size: 0.78rem !important;
        }

        .uppy-Dashboard-Item {
            background: var(--raised) !important;
            border-color: var(--border2) !important;
        }

        .uppy-Dashboard-Item-name {
            color: var(--bright) !important;
            font-size: 0.78rem !important;
        }

        .uppy-Dashboard-Item-statusSize {
            color: var(--dim) !important;
        }

        .uppy-Dashboard-Item-action--remove:hover {
            color: var(--red) !important;
        }

        .uppy-StatusBar {
            background: var(--raised) !important;
            border-top: 1px solid var(--border) !important;
        }

        .uppy-StatusBar-status {
            color: var(--dim) !important;
            font-size: 0.72rem !important;
        }

        .uppy-StatusBar-actionBtn--upload {
            background: var(--accent) !important;
            border-radius: 5px !important;
            font-size: 0.75rem !important;
        }

        .uppy-Dashboard-inner.uppy-Dashboard-inner--isDragOver {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 1px var(--accent), 0 0 24px rgba(59, 130, 246, 0.15) !important;
        }

        /* Toolbar */
        .toolbar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.9rem 1.5rem 0.6rem;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .obj-count {
            font-family: var(--mono);
            font-size: 0.68rem;
            color: var(--muted);
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 3px 9px;
            border-radius: 20px;
        }

        .search-wrap {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 0.72rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 0.72rem;
            pointer-events: none;
        }

        .search-input {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.42rem 0.85rem 0.42rem 2rem;
            font-family: var(--mono);
            font-size: 0.73rem;
            color: var(--text);
            width: 220px;
            outline: none;
            transition: border-color 0.15s;
        }

        .search-input::placeholder {
            color: var(--muted);
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        /* File table — single col-grid class for both header and rows (alignment fix) */
        .file-list-wrap {
            flex: 1;
            overflow-y: auto;
            padding: 0 1.5rem 1.5rem;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .col-grid {
            display: grid;
            grid-template-columns: 2.2rem 1fr 5.5rem 8rem 9rem;
            gap: 0;
            align-items: center;
        }

        .list-header {
            padding: 0.4rem 0.85rem;
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            margin-bottom: 0.2rem;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
        }

        .list-header-actions {
            text-align: right;
            padding-right: 0.5rem;
        }

        .file-item {
            padding: 0.65rem 0.85rem;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: background 0.12s, border-color 0.12s;
            animation: rowSlide 0.18s ease forwards;
            opacity: 0;
        }

        @keyframes rowSlide {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .file-item:hover {
            background: var(--panel);
            border-color: var(--border);
        }

        .file-type-icon {
            font-size: 1rem;
            line-height: 1;
        }

        .file-name-col {
            min-width: 0;
            padding-right: 0.75rem;
        }

        .file-name {
            font-size: 0.84rem;
            font-weight: 500;
            color: var(--bright);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-mime {
            font-family: var(--mono);
            font-size: 0.62rem;
            color: var(--muted);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-size,
        .file-date {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--dim);
        }

        .file-actions {
            display: flex;
            gap: 0.35rem;
            justify-content: flex-end;
        }

        .btn-action {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--mono);
            font-size: 0.62rem;
            letter-spacing: 0.04em;
            transition: all 0.12s;
            line-height: 1.6;
        }

        .btn-action:hover {
            border-color: var(--accent2);
            color: var(--accent2);
            background: rgba(96, 165, 250, 0.06);
        }

        .btn-action.del:hover {
            border-color: var(--red);
            color: var(--red);
            background: rgba(239, 68, 68, 0.06);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5rem 2rem;
            gap: 0.65rem;
        }

        .empty-glyph {
            font-family: var(--mono);
            font-size: 1.5rem;
            color: var(--border2);
        }

        .empty-label {
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.06em;
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.72);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.18s;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--panel);
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 1.75rem;
            width: 380px;
            transform: scale(0.96);
            transition: transform 0.18s;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.open .modal {
            transform: scale(1);
        }

        .modal-title {
            font-family: var(--mono);
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--bright);
            margin-bottom: 1.2rem;
            letter-spacing: 0.06em;
        }

        .modal-sub {
            font-size: 0.78rem;
            color: var(--dim);
            margin-bottom: 1.4rem;
            line-height: 1.6;
        }

        .modal-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 6px;
            padding: 0.65rem 0.85rem;
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--bright);
            outline: none;
            margin-bottom: 1.2rem;
            transition: border-color 0.15s;
        }

        .modal-input:focus {
            border-color: var(--accent);
        }

        .modal-row {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }

        .btn-modal {
            padding: 0.48rem 1rem;
            border-radius: 6px;
            border: 1px solid var(--border2);
            font-family: var(--mono);
            font-size: 0.72rem;
            cursor: pointer;
            transition: all 0.12s;
            background: transparent;
            color: var(--dim);
        }

        .btn-modal:hover {
            color: var(--text);
            background: var(--raised);
        }

        .btn-modal.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .btn-modal.primary:hover {
            background: var(--accent2);
            border-color: var(--accent2);
        }

        .btn-modal.danger {
            background: var(--red);
            border-color: var(--red);
            color: white;
        }

        .btn-modal.danger:hover {
            opacity: 0.85;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: var(--panel);
            border: 1px solid var(--border2);
            border-radius: 8px;
            padding: 0.7rem 1.1rem;
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            z-index: 9999;
            transform: translateY(12px);
            opacity: 0;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            max-width: 280px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        @media(max-width:860px) {
            .app {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }

            body,
            #root,
            .app,
            .main,
            .file-list-wrap {
                overflow: auto;
                height: auto;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://releases.transloadit.com/uppy/v3.25.5/uppy.min.js"></script>
    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const fmt = {
            size: b => b < 1024 ? b + ' B' : b < 1024 ** 2 ? (b / 1024).toFixed(1) + ' KB' : b < 1024 ** 3 ? (b / 1024 ** 2).toFixed(1) + ' MB' : (b / 1024 ** 3).toFixed(2) + ' GB',
            date: d => new Date(d).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }),
            pct: (u, c) => Math.min(u / c * 100, 100).toFixed(1)
        };
        const CAP = 50 * 1024 ** 3;

        const TYPE_MAP = [
            { test: m => m.startsWith('image/'), icon: '🖼️', label: 'Images', color: '#818cf8' },
            { test: m => m.startsWith('video/'), icon: '🎬', label: 'Videos', color: '#f472b6' },
            { test: m => m.startsWith('audio/'), icon: '🎵', label: 'Audio', color: '#34d399' },
            { test: m => m.includes('pdf'), icon: '📕', label: 'PDFs', color: '#fb923c' },
            { test: m => m.includes('zip') || m.includes('rar'), icon: '📦', label: 'Archives', color: '#a78bfa' },
            { test: m => m.includes('spreadsheet') || m.includes('excel'), icon: '📊', label: 'Sheets', color: '#4ade80' },
            { test: m => m.includes('word') || m.includes('document'), icon: '📝', label: 'Docs', color: '#60a5fa' },
            { test: m => m.startsWith('text/'), icon: '📄', label: 'Text', color: '#94a3b8' },
        ];
        const getType = mime => TYPE_MAP.find(t => t.test(mime)) || { icon: '📁', label: 'Other', color: '#4a5160' };

        function groupByType(files) {
            const m = {};
            files.forEach(f => { const { label, color } = getType(f.mimeType); if (!m[label]) m[label] = { count: 0, color }; m[label].count++; });
            return Object.entries(m).sort((a, b) => b[1].count - a[1].count);
        }

        function App() {
            const [files, setFiles] = useState([]);
            const [search, setSearch] = useState('');
            const [toast, setToast] = useState({ show: false, msg: '', color: '#3b82f6' });
            const [renameModal, setRenameModal] = useState(null);
            const [deleteModal, setDeleteModal] = useState(null);
            const uppyRef = useRef(null);

            const showToast = useCallback((msg, color = '#3b82f6') => {
                setToast({ show: true, msg, color });
                setTimeout(() => setToast(p => ({ ...p, show: false })), 3000);
            }, []);

            const fetchFiles = useCallback(async () => {
                try { const res = await fetch('/api/files'); setFiles(await res.json()); }
                catch { showToast('Failed to load files', '#ef4444'); }
            }, [showToast]);

            useEffect(() => { fetchFiles(); }, [fetchFiles]);

            useEffect(() => {
                if (!window.Uppy || uppyRef.current) return;
                const uppy = new Uppy.Uppy({ autoProceed: false, restrictions: { maxFileSize: 500 * 1024 * 1024 } })
                    .use(Uppy.Dashboard, {
                        inline: true, target: '#uppy-dashboard', width: '100%', height: 290,
                        note: 'Max 500 MB per file · Any format',
                        proudlyDisplayPoweredByUppy: false, theme: 'dark',
                        locale: { strings: { dropPasteFiles: 'Drop files here or %{browseFiles}', browseFiles: 'browse' } }
                    })
                    .use(Uppy.XHRUpload, { endpoint: '/api/upload', fieldName: 'file', limit: 4, formData: true });
                uppy.on('upload-success', () => fetchFiles());
                uppy.on('complete', r => {
                    if (r.successful.length > 0) showToast(`${r.successful.length} file(s) synced`, '#22c55e');
                    if (r.failed.length > 0) showToast(`${r.failed.length} upload(s) failed`, '#ef4444');
                });
                uppyRef.current = uppy;
                return () => { uppy.close(); uppyRef.current = null; };
            }, [fetchFiles, showToast]);

            const handleRename = async (id, newName) => {
                if (!newName?.trim()) return;
                try {
                    await fetch(`/api/files/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ newName: newName.trim() }) });
                    setRenameModal(null); fetchFiles(); showToast('File renamed', '#3b82f6');
                } catch { showToast('Rename failed', '#ef4444'); }
            };

            const handleDelete = async id => {
                try {
                    await fetch(`/api/files/${id}`, { method: 'DELETE' });
                    setDeleteModal(null); fetchFiles(); showToast('File deleted', '#ef4444');
                } catch { showToast('Delete failed', '#ef4444'); }
            };

            const used = files.reduce((s, f) => s + f.size, 0);
            const pct = fmt.pct(used, CAP);
            const typeData = groupByType(files);
            const filtered = files.filter(f => f.originalName.toLowerCase().includes(search.toLowerCase()));
            const largest = files.length ? files.reduce((a, b) => a.size > b.size ? a : b) : null;

            return (
                <div style={{ display: 'contents' }}>
                    <nav>
                        <div className="logo"><div className="logo-dot" />NEXUS CLOUD</div>
                        <div className="nav-pill">{fmt.size(used)} / 50 GB</div>
                    </nav>

                    <div className="app">
                        <aside className="sidebar">
                            <div className="sidebar-inner">
                                <div>
                                    <div className="sidebar-section-label">Storage</div>
                                    <div className="storage-card">
                                        <div className="storage-top">
                                            <span className="storage-used">{fmt.size(used)}</span>
                                            <span className="storage-cap">of 50 GB</span>
                                        </div>
                                        <div className="bar-track"><div className="bar-fill" style={{ width: pct + '%' }} /></div>
                                        <div className="storage-pct">{pct}% used</div>
                                    </div>
                                </div>
                                {typeData.length > 0 && (
                                    <div>
                                        <div className="sidebar-section-label">By Type</div>
                                        <div className="type-list">
                                            {typeData.map(([label, { count, color }]) => (
                                                <div key={label} className="type-row">
                                                    <div className="type-swatch" style={{ background: color }} />
                                                    <div className="type-label">{label}</div>
                                                    <div className="type-badge">{count}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                <div>
                                    <div className="sidebar-section-label">Stats</div>
                                    <div className="quick-stats">
                                        <div className="stat-row"><span className="stat-key">Total files</span><span className="stat-val">{files.length}</span></div>
                                        <div className="stat-row"><span className="stat-key">Avg size</span><span className="stat-val">{files.length ? fmt.size(Math.round(used / files.length)) : '—'}</span></div>
                                        <div className="stat-row"><span className="stat-key">Largest</span><span className="stat-val">{largest ? fmt.size(largest.size) : '—'}</span></div>
                                    </div>
                                </div>
                            </div>
                        </aside>

                        <main className="main">
                            <div className="uppy-zone"><div id="uppy-dashboard"></div></div>

                            <div className="toolbar">
                                <div className="toolbar-left">
                                    <span className="obj-count">{filtered.length} file{filtered.length !== 1 ? 's' : ''}</span>
                                </div>
                                <div className="search-wrap">
                                    <span className="search-icon">⌕</span>
                                    <input className="search-input" placeholder="Search files…" value={search} onChange={e => setSearch(e.target.value)} />
                                </div>
                            </div>

                            <div className="file-list-wrap">
                                <div className="col-grid list-header">
                                    <div></div><div>Name</div><div>Size</div><div>Uploaded</div>
                                    <div className="list-header-actions">Actions</div>
                                </div>
                                {filtered.length > 0 ? filtered.map((f, i) => (
                                    <div key={f._id} className="col-grid file-item" style={{ animationDelay: `${i * 25}ms` }}>
                                        <div className="file-type-icon">{getType(f.mimeType).icon}</div>
                                        <div className="file-name-col">
                                            <div className="file-name" title={f.originalName}>{f.originalName}</div>
                                            <div className="file-mime">{f.mimeType}</div>
                                        </div>
                                        <div className="file-size">{fmt.size(f.size)}</div>
                                        <div className="file-date">{fmt.date(f.uploadedAt)}</div>
                                        <div className="file-actions">
                                            <button className="btn-action" onClick={() => window.location.href = `/api/files/${f._id}/download`} title="Download">↓ DL</button>
                                            <button className="btn-action" onClick={() => setRenameModal(f)} title="Rename">✎ RN</button>
                                            <button className="btn-action del" onClick={() => setDeleteModal(f)} title="Delete">✕ DEL</button>
                                        </div>
                                    </div>
                                )) : (
                                    <div className="empty-state">
                                        <div className="empty-glyph">[ ]</div>
                                        <div className="empty-label">{search ? `no results for "${search}"` : '// no objects synced'}</div>
                                    </div>
                                )}
                            </div>
                        </main>
                    </div>

                    {/* RENAME MODAL */}
                    <div className={'modal-overlay' + (renameModal ? ' open' : '')} onClick={e => e.target === e.currentTarget && setRenameModal(null)}>
                        <div className="modal">
                            <div className="modal-title">// Rename object</div>
                            {renameModal && <input className="modal-input" id="rn-input" defaultValue={renameModal.originalName} autoFocus
                                onKeyDown={e => { if (e.key === 'Enter') handleRename(renameModal._id, e.target.value); if (e.key === 'Escape') setRenameModal(null); }} />}
                            <div className="modal-row">
                                <button className="btn-modal" onClick={() => setRenameModal(null)}>Cancel</button>
                                <button className="btn-modal primary" onClick={() => handleRename(renameModal?._id, document.getElementById('rn-input')?.value)}>Rename</button>
                            </div>
                        </div>
                    </div>

                    {/* DELETE MODAL */}
                    <div className={'modal-overlay' + (deleteModal ? ' open' : '')} onClick={e => e.target === e.currentTarget && setDeleteModal(null)}>
                        <div className="modal" style={{ width: 340 }}>
                            <div className="modal-title">Delete object?</div>
                            {deleteModal && <div className="modal-sub"><span style={{ color: 'var(--bright)' }}>"{deleteModal.originalName}"</span> will be permanently erased from Nexus Cloud.</div>}
                            <div className="modal-row">
                                <button className="btn-modal" onClick={() => setDeleteModal(null)}>Cancel</button>
                                <button className="btn-modal danger" onClick={() => handleDelete(deleteModal?._id)}>Delete</button>
                            </div>
                        </div>
                    </div>

                    <div className={'toast' + (toast.show ? ' show' : '')}>
                        <div className="toast-dot" style={{ background: toast.color }}></div>
                        {toast.msg}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
