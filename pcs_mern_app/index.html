<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Cloud — Personal Storage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    
    <!-- Uppy Core & Dashboard Styles -->
    <link href="https://releases.transloadit.com/uppy/v3.25.5/uppy.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0d0f12;
            --surface: #13161b;
            --panel: #191d24;
            --border: #252a34;
            --muted: #4a5160;
            --dim: #7a8394;
            --text: #d4d8e2;
            --bright: #eef0f5;
            --accent: #3b82f6;
            --accent2: #60a5fa;
            --green: #22c55e;
            --red: #ef4444;
            --amber: #f59e0b;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'IBM Plex Sans', sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── NAV ── */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: var(--mono);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            color: var(--bright);
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .logo-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--accent); }
            50% { opacity: 0.5; box-shadow: 0 0 2px var(--accent); }
        }

        .nav-meta {
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--muted);
        }

        /* ── LAYOUT ── */
        .app {
            display: grid;
            grid-template-columns: 280px 1fr;
            flex: 1;
            min-height: 0;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .sidebar-label {
            font-family: var(--mono);
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.6rem;
        }

        .storage-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
        }

        .storage-numbers {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.6rem;
        }

        .storage-used {
            font-family: var(--mono);
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--bright);
        }

        .storage-total {
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--dim);
        }

        .bar-track {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .type-list {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .type-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.78rem;
        }

        .type-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .type-name {
            flex: 1;
            color: var(--dim);
        }

        .type-count {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--muted);
        }

        /* ── MAIN ── */
        .main {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Uppy Dashboard Overrides to match theme */
        .uppy-Root { font-family: var(--sans) !important; }
        .uppy-Dashboard-inner { 
            background: var(--surface) !important; 
            border-color: var(--border) !important; 
            margin: 1.5rem !important; 
            border-radius: 8px !important;
        }
        .uppy-Dashboard-AddFiles { border-color: var(--border) !important; background: var(--surface) !important; }
        .uppy-DashboardContent-bar { background: var(--panel) !important; border-bottom: 1px solid var(--border) !important; }
        .uppy-Dashboard-Item { background: var(--panel) !important; border-color: var(--border) !important; }
        .uppy-DashboardContent-title { color: var(--bright) !important; font-size: 0.9rem !important; }
        .uppy-Dashboard-browse { color: var(--accent) !important; }
        .uppy-Button--primary { background-color: var(--accent) !important; }
        .uppy-Dashboard-AddFiles-title { color: var(--bright) !important; }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem 1rem;
        }

        .search-wrap { position: relative; }
        .search-input {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem 1rem 0.5rem 2.2rem;
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--text);
            width: 240px;
            outline: none;
        }
        .search-icon { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.8rem; }

        .file-list-wrap { flex: 1; overflow-y: auto; padding: 0 1.5rem 2rem; }
        .list-header {
            display: grid;
            grid-template-columns: 2.5rem 1fr 6rem 8rem 8rem;
            padding: 0.5rem 1rem;
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--muted);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        .file-item {
            display: grid;
            grid-template-columns: 2.5rem 1fr 6rem 8rem 8rem;
            align-items: center;
            padding: 0.8rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: background 0.15s;
        }
        .file-item:hover { background: var(--panel); }

        .file-name { font-size: 0.88rem; font-weight: 500; color: var(--bright); }
        .file-mime { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); }
        .file-size, .file-date { font-family: var(--mono); font-size: 0.75rem; color: var(--dim); }
        
        .file-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
        .btn-action {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--mono);
            font-size: 0.65rem;
            transition: all 0.15s;
        }
        .btn-action:hover { border-color: var(--accent); color: var(--accent2); }
        .btn-action.del:hover { border-color: var(--red); color: var(--red); }

        /* Modals */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: all; }
        .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; width: 380px; }
        .modal-title { font-family: var(--mono); font-size: 0.9rem; margin-bottom: 1.5rem; color: var(--bright); }
        .modal-input { width: 100%; background: var(--surface); border: 1px solid var(--border); padding: 0.8rem; color: white; border-radius: 6px; margin-bottom: 1.5rem; outline: none; }
        
        .toast {
            position: fixed; bottom: 2rem; right: 2rem; background: var(--panel); border: 1px solid var(--border);
            padding: 1rem 1.5rem; border-radius: 8px; font-family: var(--mono); font-size: 0.8rem;
            transform: translateY(100px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 0.8rem; z-index: 2000;
        }
        .toast.show { transform: translateY(0); }
        .toast-dot { width: 8px; height: 8px; border-radius: 50%; }

        @media (max-width: 900px) {
            .app { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Uppy Official UMD Bundle (includes Dashboard & XHRUpload) -->
    <script src="https://releases.transloadit.com/uppy/v3.25.5/uppy.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const fmt = {
            size: b => {
                if (b < 1024) return b + ' B';
                if (b < 1024**2) return (b / 1024).toFixed(1) + ' KB';
                if (b < 1024**3) return (b / 1024**2).toFixed(1) + ' MB';
                return (b / 1024**3).toFixed(2) + ' GB';
            },
            date: d => new Date(d).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' })
        };

        const getIcon = m => {
            if (m.startsWith('image/')) return '🖼️';
            if (m.startsWith('video/')) return '🎬';
            if (m.startsWith('audio/')) return '🎵';
            if (m.includes('pdf')) return '📕';
            return '📄';
        };

        function App() {
            const [files, setFiles] = useState([]);
            const [search, setSearch] = useState('');
            const [toast, setToast] = useState({ show: false, msg: '', color: '#3b82f6' });
            const [modals, setModals] = useState({ rename: null, confirm: null });

            const fetchFiles = useCallback(async () => {
                const res = await fetch('/api/files');
                const data = await res.json();
                setFiles(data);
            }, []);

            useEffect(() => { fetchFiles(); }, [fetchFiles]);

            const showToast = (msg, color = '#3b82f6') => {
                setToast({ show: true, msg, color });
                setTimeout(() => setToast(prev => ({ ...prev, show: false })), 3000);
            };

            // ── Uppy Initialization ───────────────────────────────────────────────
            useEffect(() => {
                if (!window.Uppy) return;

                const uppy = new Uppy.Uppy({
                    id: 'nexus-cloud-uploader',
                    autoProceed: false,
                    restrictions: { maxFileSize: 500 * 1024 * 1024 }
                })
                .use(Uppy.Dashboard, {
                    inline: true,
                    target: '#uppy-dashboard',
                    width: '100%',
                    height: 350,
                    note: 'Synchronizing objects with Nexus Cloud',
                    proudlyDisplayPoweredByUppy: false,
                    theme: 'dark'
                })
                .use(Uppy.XHRUpload, {
                    endpoint: '/api/upload',
                    fieldName: 'file',
                    limit: 5, // Enable Parallel Uploads
                    formData: true
                });

                uppy.on('upload-success', () => fetchFiles());

                uppy.on('complete', (result) => {
                    if (result.successful.length > 0) {
                        showToast('Nexus Cloud synchronized', '#22c55e');
                    }
                });

                return () => uppy.close();
            }, [fetchFiles]);

            const handleRename = async (id, name) => {
                await fetch('/api/files/' + id, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ newName: name })
                });
                setModals(m => ({ ...m, rename: null }));
                fetchFiles();
            };

            const handleDelete = async (id) => {
                await fetch('/api/files/' + id, { method: 'DELETE' });
                setModals(m => ({ ...m, confirm: null }));
                fetchFiles();
                showToast('Object Erased', '#ef4444');
            };

            const used = files.reduce((s, f) => s + f.size, 0);
            const filtered = files.filter(f => f.originalName.toLowerCase().includes(search.toLowerCase()));

            const groups = {};
            files.forEach(f => {
                const c = f.mimeType.startsWith('image/') ? 'Images' : f.mimeType.startsWith('video/') ? 'Videos' : 'Other';
                groups[c] = (groups[c] || 0) + 1;
            });

            return (
                <div style={{ display: 'contents' }}>
                    <nav>
                        <div className="logo"><div className="logo-dot"></div>NEXUS CLOUD</div>
                        <div className="nav-meta">{fmt.size(used)} / 50 GB</div>
                    </nav>

                    <div className="app">
                        <aside className="sidebar">
                            <div className="sidebar-label">Cloud Status</div>
                            <div className="storage-card">
                                <div className="storage-numbers">
                                    <span className="storage-used">{fmt.size(used)}</span>
                                    <span className="storage-total">of 50 GB</span>
                                </div>
                                <div className="bar-track"><div className="bar-fill" style={{ width: (used/(50*1024**3)*100)+'%' }}></div></div>
                            </div>
                            <div className="sidebar-label" style={{marginTop:'1.5rem'}}>Categorization</div>
                            <div className="type-list">
                                {Object.entries(groups).map(([k,v]) => (
                                    <div key={k} className="type-row">
                                        <div className="type-dot" style={{background: k==='Images'?'#818cf8':k==='Videos'?'#f472b6':'#94a3b8'}}></div>
                                        <div className="type-name">{k}</div>
                                        <div className="type-count">{v}</div>
                                    </div>
                                ))}
                            </div>
                        </aside>

                        <main className="main">
                            {/* Professional Parallel Upload UI */}
                            <div id="uppy-dashboard"></div>

                            <div className="toolbar">
                                <div style={{fontFamily:'var(--mono)', fontSize:'0.75rem', color:'var(--dim)'}}>{filtered.length} Objects</div>
                                <div className="search-wrap">
                                    <span className="search-icon">🔍</span>
                                    <input className="search-input" placeholder="Search metadata..." value={search} onChange={e => setSearch(e.target.value)} />
                                </div>
                            </div>

                            <div className="file-list-wrap">
                                <div className="list-header"><div></div><div>Metadata</div><div>Size</div><div>Uploaded</div><div></div></div>
                                {filtered.length > 0 ? filtered.map(f => (
                                    <div className="file-item" key={f._id}>
                                        <div style={{fontSize:'1.2rem'}}>{getIcon(f.mimeType)}</div>
                                        <div className="file-name-col">
                                            <div className="file-name">{f.originalName}</div>
                                            <div className="file-mime">{f.mimeType}</div>
                                        </div>
                                        <div className="file-size">{fmt.size(f.size)}</div>
                                        <div className="file-date">{fmt.date(f.uploadedAt)}</div>
                                        <div className="file-actions">
                                            <button className="btn-action" onClick={() => window.location.href='/api/files/'+f._id+'/download'}>DL</button>
                                            <button className="btn-action" onClick={() => setModals({ ...modals, rename: f })}>RN</button>
                                            <button className="btn-action del" onClick={() => setModals({ ...modals, confirm: f })}>DEL</button>
                                        </div>
                                    </div>
                                )) : (
                                    <div style={{textAlign:'center', padding:'4rem', color:'var(--muted)', fontSize:'0.85rem'}}>
                                        // No data synced with Nexus
                                    </div>
                                )}
                            </div>
                        </main>
                    </div>

                    {/* Modals */}
                    {modals.rename && (
                        <div className="modal-overlay open" onClick={e => e.target === e.currentTarget && setModals({ ...modals, rename: null })}>
                            <div className="modal">
                                <div className="modal-title">// Object Rename</div>
                                <input className="modal-input" defaultValue={modals.rename.originalName} autoFocus id="rn-in" onKeyDown={e => e.key==='Enter' && handleRename(modals.rename._id, e.target.value)} />
                                <div style={{display:'flex', gap:'0.5rem', justifyContent:'flex-end'}}>
                                    <button className="btn-action" style={{padding:'8px 16px'}} onClick={() => setModals({ ...modals, rename: null })}>Cancel</button>
                                    <button className="btn-action" style={{padding:'8px 16px', background:'var(--accent)', color:'white', borderColor:'var(--accent)'}} onClick={() => handleRename(modals.rename._id, document.getElementById('rn-in').value)}>Rename</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {modals.confirm && (
                        <div className="modal-overlay open" onClick={e => e.target === e.currentTarget && setModals({ ...modals, confirm: null })}>
                            <div className="modal" style={{width:'320px'}}>
                                <div className="modal-title" style={{marginBottom:'10px'}}>Delete Object?</div>
                                <div style={{fontSize:'0.8rem', color:'var(--dim)', marginBottom:'20px'}}>"{modals.confirm.originalName}" will be erased.</div>
                                <div style={{display:'flex', gap:'0.5rem', justifyContent:'flex-end'}}>
                                    <button className="btn-action" style={{padding:'8px 16px'}} onClick={() => setModals({ ...modals, confirm: null })}>Cancel</button>
                                    <button className="btn-action del" style={{padding:'8px 16px', background:'var(--red)', color:'white', borderColor:'var(--red)'}} onClick={() => handleDelete(modals.confirm._id)}>Delete</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className={'toast' + (toast.show ? ' show' : '')}>
                        <div className="toast-dot" style={{background: toast.color}}></div>
                        {toast.msg}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

</html>
