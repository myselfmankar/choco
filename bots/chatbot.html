<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>TasteBite Restaurant</title>

        <style>
            body {
                background-color: aquamarine;
            }
            .chat-container {
                background-color: burlywood;
                position: fixed;
                bottom: 10px;
                right: 20px;
                height: 150px;
                border: 2px solid black;
                width: auto;

                height: auto;
            }
            .chat-box {
                border: 2px;
                border-color: black;
                
            }
            #navbar {
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                border: 1px solid red;
            }
        </style>
    </head>
    <body>
        <div>
            <h1 style="text-align: center"><b>TasteBite Restaurant</b></h1>

            <div id="navbar">
                <nav>
                    <a href="./chatbot/menu.html">Menu</a>
                    <a href="./chatbot/contact.html">Contact</a>
                </nav>
            </div>

            <div class="chat-container">
                <p><b>CHAT ASSISTANT</b></p>
                <hr />
                <div class="chat-box" id="chatMessages">
                    <p><b>Bot: Ask me about the restaurant</b></p>
                </div>

                <input type="text" id="userInput" />
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

        <script>
            const botData = {
                name: "TasteBite Restaurant",
                values: ["Cleanliness", "Quality", "Taste"],
                year: "2015",
                menu: ["Paneer Masala", "Veg Biriyani", "Pizza", "Noodles"],
                cuisines: ["Indian", "Italian", "Chinese"],
                email: "admin@tastebite.com",
            };

            function sendMessage() {
                let inputField = document.getElementById("userInput");
                let text = inputField.value;

                let box = document.getElementById("chatMessages");
                box.innerHTML += "<p><b>You: </b>" + text + "</p>";

                let reply = getResponse(text);
                box.innerHTML += "<p><b>Bot:</b> " + reply + "</p>";

                inputField.value = "";
                box.scrollTop = box.scrollHeight;
            }

            function getResponse(input) {
                let msg = input.toLowerCase();

                if (msg == "hi" || msg == "hey" || msg == "hello") {
                    return "Welcome to " + botData.name;
                }

                if (msg.includes("about") || msg.includes("history")) {
                    return (
                        botData.name +
                        " was started in " +
                        botData.year +
                        " and serve " +
                        botData.cuisines.join(", ")
                    );
                }

                return "sorry i didnt understand";
            }
        </script>
    </body>
</html>
