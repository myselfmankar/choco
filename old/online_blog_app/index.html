<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog </title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background-color: #16a085;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #1abc9c;
        }

        .post-list {
            margin-top: 2rem;
        }

        .post-card {
            border-bottom: 1px solid #eee;
            padding: 1rem 0;
        }

        .post-card h3 {
            margin: 0;
            color: #333;
        }

        .post-card p {
            color: #666;
            line-height: 1.6;
        }

        .post-card .meta {
            font-size: 0.8rem;
            color: #999;
        }

        .delete-btn {
            background-color: #d11a2a;
            padding: 5px 10px;
            margin-top: 10px;
        }

        .delete-btn:hover {
            background-color: #a30000;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Community Insight Blog</h1>

        <div id="create-post">
            <h2>Share a Story</h2>
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" placeholder="Enter post title">
            </div>
            <div class="form-group">
                <label for="content">Content</label>
                <textarea id="content" rows="4" placeholder="Write your blog post here..."></textarea>
            </div>
            <button onclick="addPost()">Publish Post</button>
        </div>

        <div class="post-list">
            <h2>Recent Blog Posts</h2>
            <div id="posts-container">
                <!-- Posts will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        async function fetchPosts() {
            const res = await fetch('/api/posts');
            const posts = await res.json();
            const container = document.getElementById('posts-container');
            container.innerHTML = '';

            posts.forEach(post => {
                container.innerHTML += `
                    <div class="post-card">
                        <h3>${post.title}</h3>
                        <p>${post.content}</p>
                        <div class="meta">By ${post.author}</div>
                        <button class="edit-btn" onclick="editPost('${post._id}', '${post.title.replace(/'/g, "\\'")}', '${post.content.replace(/'/g, "\\'")}')">Edit Post</button>
                        <button class="delete-btn" onclick="deletePost('${post._id}')">Delete Post</button>
                    </div>
                `;
            });
        }

        async function editPost(id, oldTitle, oldContent) {
            const title = prompt("Edit Title:", oldTitle);
            const content = prompt("Edit Content:", oldContent);
            
            if (title === null || content === null) return;
            if (!title || !content) return alert("Title and Content cannot be empty");

            await fetch(`/api/posts/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content })
            });

            fetchPosts();
        }

        async function addPost() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;

            if (!title || !content) return alert("Please fill title and content");

            await fetch('/api/posts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content, author: 'Contributor' })
            });

            document.getElementById('title').value = '';
            document.getElementById('content').value = '';
            fetchPosts();
        }

        async function deletePost(id) {
            if (!confirm("Are you sure?")) return;
            await fetch(`/api/posts/${id}`, { method: 'DELETE' });
            fetchPosts();
        }

        // Initial load
        fetchPosts();
    </script>
</body>

</html>
